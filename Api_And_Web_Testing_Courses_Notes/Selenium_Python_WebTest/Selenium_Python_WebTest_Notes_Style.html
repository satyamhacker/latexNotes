<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selenium Python WebTest Notes</title>
    <meta name="description" content="Comprehensive Selenium Python automation testing notes in Hinglish — from basics to advanced.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c12;
            --bg2: #0d1117;
            --bg3: #161b22;
            --bg4: #1c2128;
            --border: #21262d;
            --border2: #30363d;
            --txt: #e6edf3;
            --txt2: #8b949e;
            --txt3: #6e7681;
            --blue: #58a6ff;
            --cyan: #39d353;
            --purple: #bc8cff;
            --orange: #ffa657;
            --red: #ff7b72;
            --yellow: #e3b341;
            --grad: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --grad2: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --grad3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --glow: 0 0 30px rgba(88,166,255,0.15);
            --shadow: 0 8px 32px rgba(0,0,0,0.6);
            --radius: 12px;
            --sidebar-w: 300px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            font-size: 15px;
            overflow-x: hidden;
        }

        /* ── LOADER ── */
        #loader {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            gap: 1.5rem;
            transition: opacity 0.5s ease;
        }
        #loader.hide { opacity: 0; pointer-events: none; }
        .loader-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem; font-weight: 900;
            background: var(--grad3);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loader-bar {
            width: 220px; height: 3px;
            background: var(--bg3);
            border-radius: 99px; overflow: hidden;
        }
        .loader-fill {
            height: 100%;
            background: var(--grad3);
            border-radius: 99px;
            animation: load 1.4s ease forwards;
        }
        @keyframes load { from { width: 0; } to { width: 100%; } }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: rgba(13,17,23,0.92);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 1.6rem 1.4rem 1.2rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; font-weight: 800;
            background: var(--grad3);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .brand-icon { -webkit-text-fill-color: #39d353; font-size: 1rem; }
        .search-wrap { position: relative; }
        .search-wrap input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 0.5rem 0.8rem 0.5rem 2.2rem;
            color: var(--txt);
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: var(--blue); }
        .search-wrap input::placeholder { color: var(--txt3); }
        .search-icon {
            position: absolute; left: 0.6rem; top: 50%;
            transform: translateY(-50%);
            color: var(--txt3); font-size: 0.75rem;
        }

        .toc-scroll {
            flex: 1; overflow-y: auto; padding: 0.8rem 0.8rem 2rem;
        }
        .toc-scroll::-webkit-scrollbar { width: 4px; }
        .toc-scroll::-webkit-scrollbar-track { background: transparent; }
        .toc-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

        .toc-list { list-style: none; }
        .toc-list li { margin: 2px 0; }
        .toc-list a {
            display: block;
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            color: var(--txt2);
            text-decoration: none;
            font-size: 0.78rem;
            line-height: 1.4;
            transition: background 0.15s, color 0.15s;
        }
        .toc-list a:hover, .toc-list a.active {
            background: rgba(88,166,255,0.1);
            color: var(--blue);
        }
        .toc-h2 { font-weight: 600; font-size: 0.82rem; color: var(--txt); }
        .toc-h3 { padding-left: 1.4rem !important; }

        /* ── MAIN CONTENT ── */
        .main {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            padding: 3rem 4rem 6rem;
            max-width: calc(var(--sidebar-w) + 900px);
        }

        /* ── HERO BANNER ── */
        .hero {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 40%, #1a1035 100%);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3.5rem 3rem;
            margin-bottom: 3.5rem;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute; top: -80px; right: -80px;
            width: 320px; height: 320px;
            background: radial-gradient(circle, rgba(188,140,255,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute; bottom: -60px; left: 100px;
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(79,172,254,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(57,211,83,0.12);
            border: 1px solid rgba(57,211,83,0.3);
            color: var(--cyan);
            font-size: 0.75rem; font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 99px;
            margin-bottom: 1.2rem;
        }
        .hero h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.2rem; font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.6rem;
        }
        .hero h1 span {
            background: var(--grad3);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-sub {
            color: var(--txt2); font-size: 1rem;
            max-width: 500px; margin-bottom: 2rem;
        }
        .hero-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .hero-tag {
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--txt2); font-size: 0.75rem;
            padding: 0.25rem 0.7rem;
            border-radius: 6px;
        }

        /* ── HEADINGS ── */
        #content-area h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem; font-weight: 800;
            margin-top: 4rem; margin-bottom: 1.5rem;
            padding: 1.2rem 1.5rem;
            background: linear-gradient(135deg, rgba(79,172,254,0.08) 0%, rgba(0,242,254,0.04) 100%);
            border: 1px solid rgba(79,172,254,0.25);
            border-left: 4px solid #4facfe;
            border-radius: 0 12px 12px 0;
            color: #e6edf3;
            position: relative;
            overflow: hidden;
        }
        #content-area h2::before {
            content: '';
            position: absolute; top: 0; left: 0; bottom: 0; width: 4px;
            background: var(--grad3);
        }

        #content-area h3 {
            font-size: 1.25rem; font-weight: 600;
            color: var(--txt);
            margin-top: 2.5rem; margin-bottom: 1rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.5rem;
        }
        #content-area h3::before {
            content: '▸';
            color: var(--blue);
            font-size: 0.9rem;
        }

        #content-area h4 {
            font-size: 1rem; font-weight: 600;
            color: var(--purple);
            margin-top: 1.5rem; margin-bottom: 0.6rem;
        }

        /* ── PARAGRAPHS & LISTS ── */
        #content-area p {
            color: var(--txt2);
            margin-bottom: 0.9rem;
            line-height: 1.8;
        }
        #content-area ul, #content-area ol {
            color: var(--txt2);
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }
        #content-area li { margin-bottom: 0.35rem; line-height: 1.7; }
        #content-area li::marker { color: var(--blue); }

        /* ── INLINE CODE ── */
        #content-area p code,
        #content-area li code,
        #content-area td code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82em;
            background: rgba(88,166,255,0.1);
            border: 1px solid rgba(88,166,255,0.2);
            color: #79c0ff;
            padding: 0.15em 0.5em;
            border-radius: 5px;
        }

        /* ── CODE BLOCKS ── */
        .code-block {
            background: #010409;
            border: 1px solid rgba(48, 54, 61, 0.8);
            border-top: 2px solid rgba(79, 172, 254, 0.4);
            border-radius: var(--radius);
            margin: 1.8rem 0;
            box-shadow: 0 0 0 1px rgba(79,172,254,0.08), 0 16px 48px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.04);
            overflow: hidden;
            position: relative;
        }
        .code-header {
            background: linear-gradient(90deg, #0d1117 0%, #111820 100%);
            padding: 0.7rem 1.1rem;
            display: flex; align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(48,54,61,0.9);
            gap: 1rem;
        }
        .dot-group { display: flex; gap: 7px; align-items: center; }
        .dot {
            width: 13px; height: 13px; border-radius: 50%;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
        }
        .dot-r { background: #ff5f57; box-shadow: 0 0 8px rgba(255,95,87,0.5); }
        .dot-y { background: #febc2e; box-shadow: 0 0 8px rgba(254,188,46,0.4); }
        .dot-g { background: #28c840; box-shadow: 0 0 8px rgba(40,200,64,0.5); }
        .code-lang {
            flex: 1;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: rgba(139,148,158,0.7);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 500;
        }
        .copy-btn {
            display: inline-flex; align-items: center; gap: 0.35rem;
            background: rgba(79,172,254,0.08);
            border: 1px solid rgba(79,172,254,0.2);
            color: rgba(79,172,254,0.8);
            font-size: 0.72rem; font-family: 'Inter', sans-serif;
            font-weight: 500;
            padding: 0.3rem 0.75rem;
            border-radius: 6px; cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .copy-btn:hover {
            background: rgba(79,172,254,0.15);
            border-color: rgba(79,172,254,0.4);
            color: #4facfe;
        }
        .copy-btn.copied {
            background: rgba(57,211,83,0.12);
            border-color: rgba(57,211,83,0.35);
            color: #39d353;
        }
        .code-block pre {
            margin: 0;
            padding: 1.4rem 1.6rem;
            overflow-x: auto;
            background: transparent !important;
        }
        .code-block pre::-webkit-scrollbar { height: 5px; }
        .code-block pre::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        .code-block pre::-webkit-scrollbar-thumb {
            background: rgba(79,172,254,0.25);
            border-radius: 4px;
        }
        .code-block pre::-webkit-scrollbar-thumb:hover {
            background: rgba(79,172,254,0.45);
        }
        .code-block code {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.88rem !important;
            line-height: 1.75 !important;
            background: transparent !important;
            border: none !important;
            color: #abb2bf !important;
            padding: 0 !important;
            tab-size: 4;
        }
        /* Atom One Dark overrides for crisper colors */
        .code-block .hljs-keyword { color: #c678dd !important; font-weight: 600; }
        .code-block .hljs-built_in { color: #61afef !important; }
        .code-block .hljs-string { color: #98c379 !important; }
        .code-block .hljs-comment { color: #5c6370 !important; font-style: italic; }
        .code-block .hljs-number { color: #d19a66 !important; }
        .code-block .hljs-function { color: #61afef !important; }
        .code-block .hljs-title { color: #61afef !important; }
        .code-block .hljs-params { color: #abb2bf !important; }
        .code-block .hljs-attr { color: #d19a66 !important; }
        .code-block .hljs-literal { color: #56b6c2 !important; }
        .code-block .hljs-tag { color: #e06c75 !important; }
        .code-block .hljs-name { color: #e06c75 !important; }

        /* ── TABLES ── */
        #content-area table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        #content-area th {
            background: var(--bg4);
            color: var(--blue);
            padding: 0.85rem 1rem;
            text-align: left;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border2);
        }
        #content-area td {
            padding: 0.75rem 1rem;
            color: var(--txt2);
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
            vertical-align: top;
        }
        #content-area tr:last-child td { border-bottom: none; }
        #content-area tr:hover td { background: rgba(88,166,255,0.04); }

        /* ── BLOCKQUOTE / NOTE BOXES ── */
        #content-area blockquote {
            background: rgba(255,166,87,0.07);
            border-left: 4px solid var(--orange);
            border-radius: 0 8px 8px 0;
            padding: 1rem 1.2rem;
            margin: 1.2rem 0;
            color: var(--txt2);
            font-size: 0.9rem;
        }

        /* ── HR ── */
        #content-area hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        /* ── STRONG ── */
        #content-area strong { color: var(--txt); font-weight: 600; }

        /* ── SCROLL TO TOP ── */
        #scrollTop {
            position: fixed; bottom: 2rem; right: 2rem;
            width: 42px; height: 42px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--blue);
            font-size: 0.9rem;
            box-shadow: var(--shadow);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.2s;
            z-index: 50;
        }
        #scrollTop.show { opacity: 1; pointer-events: auto; }
        #scrollTop:hover { transform: translateY(-2px); }

        /* ── PRINT ── */
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .sidebar, #scrollTop, #loader, .copy-btn, .dot-group { display: none !important; }
            .main { margin-left: 0; padding: 1rem 2rem; max-width: 100%; }
            body { background: #0d1117 !important; }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            :root { --sidebar-w: 0px; }
            .sidebar { transform: translateX(-300px); }
            .sidebar.open { transform: translateX(0); width: 300px; }
            .main { margin-left: 0; padding: 2rem 1.5rem 5rem; }
            .hero h1 { font-size: 2.2rem; }
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero { animation: fadeUp 0.6s ease both; }
        #content-area h2 { animation: fadeUp 0.4s ease both; }
    </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-logo"><i class="fa-brands fa-python"></i> Selenium Notes</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="brand">
            <span class="brand-icon"><i class="fa-brands fa-python"></i></span>
            Selenium Python
        </div>
        <div class="search-wrap">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="toc-search" placeholder="Filter topics…">
        </div>
    </div>
    <div class="toc-scroll">
        <ul class="toc-list" id="toc"></ul>
    </div>
</nav>

<!-- SCROLL TO TOP -->
<button id="scrollTop" title="Scroll to top"><i class="fas fa-chevron-up"></i></button>

<!-- MAIN -->
<main class="main">
    <div class="hero">
        <div class="hero-badge"><i class="fas fa-circle-dot"></i> Automation Testing</div>
        <h1>Selenium <span>Python</span><br>WebTest Notes</h1>
        <p class="hero-sub">Complete end-to-end Selenium automation notes in Hinglish — concise, structured, with code examples.</p>
        <div class="hero-tags">
            <span class="hero-tag"><i class="fa-brands fa-python"></i> Python 3</span>
            <span class="hero-tag">Selenium 4</span>
            <span class="hero-tag">WebDriver</span>
            <span class="hero-tag">PyTest</span>
            <span class="hero-tag">Page Object Model</span>
            <span class="hero-tag">Appium</span>
        </div>
    </div>
    <div id="content-area"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function() {
    const contentArea = document.getElementById('content-area');
    const tocList     = document.getElementById('toc');
    const loader      = document.getElementById('loader');
    const scrollBtn   = document.getElementById('scrollTop');
    const tocSearch   = document.getElementById('toc-search');

    // ── Scroll to top ──
    window.addEventListener('scroll', () => {
        scrollBtn.classList.toggle('show', window.scrollY > 400);
    });
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ── TOC search ──
    tocSearch.addEventListener('input', () => {
        const q = tocSearch.value.toLowerCase();
        document.querySelectorAll('#toc li').forEach(li => {
            li.style.display = li.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    });

    // ── Active TOC link on scroll ──
    let headingEls = [];
    function updateActiveToc() {
        const scrollY = window.scrollY + 120;
        let active = null;
        headingEls.forEach(h => { if (h.offsetTop <= scrollY) active = h; });
        document.querySelectorAll('#toc a').forEach(a => {
            a.classList.toggle('active', active && a.getAttribute('href') === '#' + active.id);
        });
    }
    window.addEventListener('scroll', updateActiveToc, { passive: true });

    // ── Copy code ──
    window.copyCode = function(btn) {
        const code = btn.closest('.code-block').querySelector('code');
        navigator.clipboard.writeText(code.innerText).then(() => {
            btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                btn.classList.remove('copied');
            }, 2000);
        });
    };

    // ── Slugify ──
    function slug(t) {
        return t.toLowerCase().replace(/[^\w\s-]/g, '').trim().replace(/[\s]+/g, '-').replace(/-+/g, '-');
    }

    // ── Custom renderer ──
    const renderer = new marked.Renderer();

    renderer.heading = function(text, level) {
        const safeText = String(text || '');
        const id = slug(safeText.replace(/[🎯🚀💡❓⌨️⚙️❌🤔🧑‍🏫💻✍️]/gu, '').trim());
        return `<h${level} id="${id}">${safeText}</h${level}>`;
    };

    renderer.code = function(code, lang) {
        const safeCode = String(code || '');
        const safeLang = (lang || 'plaintext').trim();
        let highlighted = safeCode;
        try {
            if (safeLang && hljs.getLanguage(safeLang)) {
                highlighted = hljs.highlight(safeCode, { language: safeLang }).value;
            } else {
                highlighted = hljs.highlightAuto(safeCode).value;
            }
        } catch(e) { highlighted = hljs.highlightAuto(safeCode).value; }

        return `<div class="code-block">
  <div class="code-header">
    <div class="dot-group">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
    </div>
    <span class="code-lang">${safeLang}</span>
    <button class="copy-btn" onclick="copyCode(this)"><i class="fas fa-copy"></i> Copy</button>
  </div>
  <pre><code class="hljs language-${safeLang}">${highlighted}</code></pre>
</div>`;
    };

    marked.use({ renderer, breaks: true, gfm: true });

    // ── Fetch & render ──
    fetch('Selenium_Python_WebTest_Notes.md')
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(md => {
            contentArea.innerHTML = marked.parse(md);

            // Build TOC
            headingEls = Array.from(contentArea.querySelectorAll('h2, h3'));
            headingEls.forEach(h => {
                const li  = document.createElement('li');
                const a   = document.createElement('a');
                a.href    = '#' + h.id;
                a.textContent = h.textContent;
                a.className = 'toc-' + h.tagName.toLowerCase();
                li.appendChild(a);
                tocList.appendChild(li);
            });

            // Hide loader
            loader.classList.add('hide');
            setTimeout(() => loader.style.display = 'none', 500);
        })
        .catch(err => {
            loader.innerHTML = `<div style="color:#ff7b72;text-align:center">
                <i class="fas fa-triangle-exclamation" style="font-size:2rem;margin-bottom:1rem"></i>
                <p>Could not load notes file.</p>
                <small>${err}</small>
            </div>`;
        });
})();
</script>
</body>
</html>
