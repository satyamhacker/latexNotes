<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Hacking Tools Notes</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Highlight CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">

    <style>
        :root {
            /* Color Palette - Deep Dark Theme */
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --text-primary: #ffffff; /* Pure white for better readability */
            --text-secondary: #e6edf3; /* Much brighter grey */
            --accent-blue: #58a6ff;
            --accent-gradient: linear-gradient(135deg, #61dafb 0%, #4facfe 100%);
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent-blue);
            z-index: 9999;
        }

        /* Sidebar & Layout Styles */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            color: var(--accent-blue);
            margin-bottom: 1rem;
            font-weight: 600;
            border-bottom: none;
            padding-bottom: 0;
            margin-top: 0;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            margin: 0.5rem 0;
        }

        .sidebar a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: background 0.2s, color 0.2s;
        }

        .sidebar a:hover {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-blue);
        }

        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            border-bottom: 3px solid var(--border-color);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
        }

        h2 {
            color: var(--text-primary);
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        h3 {
            color: var(--text-secondary);
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 0.8rem;
        }

        h4 {
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-top: 1.5rem;
            margin-bottom: 0.6rem;
        }

        /* Topic & Module Sections - Big Bold Blue */
        h2.topic-section, h2.module-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 5px solid #4facfe;
            padding-left: 1rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            border-bottom: none;
        }

        p {
            margin: 1rem 0;
            color: var(--text-secondary);
        }

        ul, ol {
            margin: 1rem 0 1rem 2rem;
            color: var(--text-secondary);
        }

        li {
            margin: 0.5rem 0;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        a:hover {
            border-bottom-color: var(--accent-blue);
        }

        /* Mac-Style Code Blocks */
        pre.mac-window {
            background: #0d1115;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 2rem 0;
            
            /* STRICT WRAPPING FOR PDF */
            white-space: pre-wrap !important;
            word-break: break-word !important; 
            overflow-x: hidden !important;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between;
            align-items: center;
        }

        /* Dots helper (add these classes too) */
        .window-controls { display: flex; gap: 6px; }
        .control { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        .copy-btn {
            background: var(--accent-blue);
            color: #ffffff;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }

        pre code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            display: block;
            padding: 1.5rem;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
        }

        code {
            font-family: 'Fira Code', monospace;
            background: var(--bg-secondary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: #61dafb;
        }

        pre code {
            background: transparent;
            padding: 1.5rem;
            color: inherit;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        th {
            background: #1c2128;
            color: var(--accent-blue);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        /* Blockquote */
        blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(88, 166, 255, 0.06);
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }

        /* CRITICAL PRINT STYLES - DO NOT MODIFY */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { margin: 0; padding: 0; }
            
            .print-wrapper {
                background-color: #0f1115 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                min-height: 100vh;
                width: 100%;
                margin: 0; padding: 0;
            }

            /* Force white text for readability */
            .main-content, p, li, h1, h2, h3, h4, h5, h6, td, th {
                color: #ffffff !important;
            }

            /* Ensure Inline Code keeps its color */
            code:not(.hljs) {
                color: #61dafb !important;
                background-color: #161b22 !important;
            }

            /* Keep code blocks distinct */
            pre.mac-window {
                background-color: #0d1115 !important;
                border: 1px solid #444 !important;
                page-break-inside: avoid;
            }

            /* GUARANTEE SYNTAX HIGHLIGHTING IN PRINT (Vibrant Dark Theme) */
            pre code.hljs, pre .hljs, pre .hljs * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .hljs-comment, .hljs-quote { color: #8b949e !important; font-style: italic !important; }
            .hljs-doctag, .hljs-keyword, .hljs-formula { color: #ff7b72 !important; }
            .hljs-section, .hljs-name, .hljs-selector-tag, .hljs-deletion, .hljs-subst { color: #79c0ff !important; }
            .hljs-literal { color: #79c0ff !important; }
            .hljs-string, .hljs-regexp, .hljs-addition, .hljs-attribute, .hljs-meta-string { color: #a5d6ff !important; }
            .hljs-built_in, .hljs-class .hljs-title { color: #ffa657 !important; }
            .hljs-attr, .hljs-variable, .hljs-template-variable, .hljs-type, .hljs-selector-class, .hljs-selector-attr, .hljs-selector-pseudo, .hljs-number { color: #79c0ff !important; }
            .hljs-symbol, .hljs-bullet, .hljs-link, .hljs-meta, .hljs-selector-id, .hljs-title { color: #d2a8ff !important; }
            .hljs-emphasis { font-style: italic !important; }
            .hljs-strong { font-weight: bold !important; }

            .sidebar, .copy-btn, .window-controls, #loader {
                display: none !important;
            }

            .layout {
                display: block;
            }
            
            .main-content { padding: 2rem !important; margin: 0 auto; max-width: 100%; }
            
            a { text-decoration: none !important; border-bottom: none !important; }
        }

        @media(max-width:768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                transition: transform 0.3s;
                z-index: 1000;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
    
    <!-- WRAPPER IS MANDATORY FOR PRINTING BACKGROUNDS -->
    <div class="print-wrapper">
        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <h2><i class="fas fa-list"></i> Contents</h2>
                <ul id="toc"></ul>
            </nav>
            <main class="main-content" id="content-area">
                <!-- Markdown content goes here -->
            </main>
        </div>
    </div>

    <!-- Required Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contentArea = document.getElementById("content-area");
            const toc = document.getElementById("toc");
            const loader = document.getElementById("loader");

            // Fetch the specific markdown file
            fetch("Python_Hacking_Tools_Notes_Zaidh_Sabih.md")
                .then(response => response.ok ? response.text() : Promise.reject("Failed to load markdown file"))
                .then(markdown => {
                    // 1. Pre-process Markdown (Fix indented modules)
                    // Converts "  Module 1:" to "## MODULE_MARKER Module 1:"
                    let processed = markdown.replace(/^\s*(Module\s+\d+(\.\d+)?:?)/gm, '## MODULE_MARKER $1');
                    // Converts "Topic X.X:" to special heading
                    processed = processed.replace(/^##\s+(Topic\s+\d+\.\d+:.*)/gm, '## TOPIC_MARKER $1');
                    // Converts "1.1:" to bold
                    processed = processed.replace(/^\s*(\d+\.\d+:)/gm, '**$1**');

                    // 2. Configure Renderer
                    const renderer = new marked.Renderer();
                    
                    // Safety check: Cast code to string to avoid [object Object] crash
                    renderer.code = function(code, language) {
                        const safeCode = code ? String(code) : '';
                        // Robust highlighting with Auto-detection
                        let highlighted = safeCode;
                        // If language is provided and valid, use it
                        if (language && hljs.getLanguage(language)) {
                            try {
                                highlighted = hljs.highlight(safeCode, { language: language }).value;
                            } catch (e) { highlighted = hljs.highlightAuto(safeCode).value; }
                        } else {
                            // Otherwise, or if 'plaintext', force auto-detection
                            highlighted = hljs.highlightAuto(safeCode).value;
                        }
                        
                        const id = Math.random().toString(36).substr(2, 9);
                        
                        return `
                        <pre class="mac-window">
                            <div class="code-header">
                                <div class="window-controls">
                                    <span class="control red"></span>
                                    <span class="control yellow"></span>
                                    <span class="control green"></span>
                                </div>
                                <button class="copy-btn" onclick="copyCode('${id}', this)"><i class="fas fa-copy"></i> Copy</button>
                            </div>
                            <code id="${id}" class="hljs language-${language || 'plaintext'}">${highlighted}</code>
                        </pre>`;
                    };
                    
                    renderer.heading = function(text, level) {
                         const safeText = text ? String(text) : '';
                         const id = safeText.toLowerCase().replace(/[^\w]+/g, '-');
                         
                         // Check if this is a Module section
                         if (safeText.startsWith('MODULE_MARKER ')) {
                             const cleanText = safeText.replace('MODULE_MARKER ', '');
                             const cleanId = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                             return `<h${level} class="module-section" id="${cleanId}">${cleanText}</h${level}>`;
                         }
                         
                         // Check if this is a Topic section
                         if (safeText.startsWith('TOPIC_MARKER ')) {
                             const cleanText = safeText.replace('TOPIC_MARKER ', '');
                             const cleanId = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                             return `<h${level} class="topic-section" id="${cleanId}">${cleanText}</h${level}>`;
                         }
                         
                         return `<h${level} id="${id}">${safeText}</h${level}>`;
                    };

                    marked.setOptions({ renderer: renderer, breaks: true, gfm: true });

                    // 3. Render
                    contentArea.innerHTML = marked.parse(processed);

                    // Generate TOC
                    const headings = contentArea.querySelectorAll("h1, h2, h3");
                    headings.forEach(heading => {
                        const li = document.createElement("li");
                        const a = document.createElement("a");
                        a.href = `#${heading.id}`;
                        a.textContent = heading.textContent;
                        a.style.paddingLeft = heading.tagName === "H1" ? "0" : heading.tagName === "H2" ? "1rem" : "2rem";
                        li.appendChild(a);
                        toc.appendChild(li);
                    });

                    loader.style.display = "none";
                })
                .catch(err => {
                    console.error(err);
                    loader.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading notes';
                });
        });

        function copyCode(id, btn) {
            const codeBlock = document.getElementById(id);
            if (!codeBlock) return;
            const text = codeBlock.innerText;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                }, 2000);
            }).catch(err => console.error("Copy failed:", err));
        }
    </script>
</body>
</html>
