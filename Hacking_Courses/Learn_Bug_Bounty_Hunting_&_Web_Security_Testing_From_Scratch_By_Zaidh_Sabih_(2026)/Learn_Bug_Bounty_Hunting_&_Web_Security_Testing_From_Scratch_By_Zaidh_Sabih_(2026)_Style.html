<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Bounty Hunting Notes Viewer</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Highlight CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <style>
        :root {
            /* Color Palette - Deep Dark Theme */
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --text-primary: #ffffff; /* Pure white for better readability */
            --text-secondary: #e6edf3; /* Much brighter grey */
            --accent-blue: #58a6ff;
            --accent-gradient: linear-gradient(135deg, #61dafb 0%, #4facfe 100%);
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: var(--accent-blue);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h2 {
            color: var(--text-primary);
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        
        h3 {
            font-size: 1.5rem;
            margin-top: 2rem;
            color: var(--text-secondary);
        }

        /* Topic & Module Sections - Big Bold Blue */
        h2.topic-section, h2.module-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 5px solid #4facfe;
            padding-left: 1rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            border-bottom: none;
        }

        /* Mac-Style Code Blocks */
        pre.mac-window {
            background: #0d1115;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 2rem 0;
            
            /* STRICT WRAPPING FOR PDF */
            white-space: pre-wrap !important;
            word-break: break-word !important; 
            overflow-x: hidden !important;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between;
            align-items: center;
        }

        /* Dots helper */
        .control { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        code {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap !important; 
            word-wrap: break-word !important;
            padding: 1rem;
            display: block;
        }
        
        /* Inline code styling */
        p code, li code, td code {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            display: inline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        th {
            background: #1c2128;
            color: var(--accent-blue);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
            height: 100vh;
            box-sizing: border-box;
        }
        
        .sidebar h2 {
            font-size: 1.2rem;
            margin-top: 0;
            border-bottom: none;
            color: var(--text-primary);
            padding-bottom: 0;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: background 0.2s, color 0.2s;
            line-height: 1.4;
            margin-bottom: 2px;
        }

        .sidebar a:hover {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-blue);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Blockquote */
        blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(88, 166, 255, 0.06);
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        button.copy-btn {
            background: #21262d;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        button.copy-btn:hover {
            background: #30363d;
            color: var(--text-primary);
        }

        img {
            max-width: 100%;
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        /* CRITICAL PRINT STYLES - DO NOT MODIFY */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { margin: 0; padding: 0; }
            
            .print-wrapper {
                background-color: #0f1115 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                min-height: 100vh;
                width: 100%;
                margin: 0; padding: 0;
            }

            /* Force white text for readability */
            .main-content, p, li, h1, h2, h3, h4, h5, h6, td, th {
                color: #ffffff !important;
            }

            /* Keep code blocks distinct */
            pre {
                border: 1px solid #444;
                page-break-inside: avoid;
            }

            .sidebar, .copy-btn, .window-controls, #loader {
                display: none !important;
            }

            .layout {
                display: block;
            }
            
            .main-content { padding: 2rem !important; margin: 0 auto; max-width: 100%; }
            
            a { text-decoration: none !important; border-bottom: none !important; }
        }
    </style>
</head>
<body>
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Rendering Markdown...</div>
    
    <!-- WRAPPER IS MANDATORY FOR PRINTING BACKGROUNDS -->
    <div class="print-wrapper" style="display: none;" id="main-wrapper">
        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <h2>Contents</h2>
                <!-- TOC goes here -->
            </nav>
            <main class="main-content" id="content-area">
                <!-- Markdown content goes here -->
            </main>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contentArea = document.getElementById('content-area');
            const loader = document.getElementById('loader');
            const wrapper = document.getElementById('main-wrapper');
            const sidebar = document.getElementById('sidebar');

            // Copy function for code blocks
            window.copyCode = function(button) {
                const pre = button.closest('.mac-window');
                const code = pre.querySelector('code').innerText;
                navigator.clipboard.writeText(code).then(() => {
                    button.innerText = 'Copied!';
                    setTimeout(() => { button.innerText = 'Copy'; }, 2000);
                });
            };

            fetch("Learn_Bug_Bounty_Hunting_&_Web_Security_Testing_From_Scratch_By_Zaidh_Sabih_(2026).md")
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Failed to fetch markdown file");
                    }
                    return response.text();
                })
                .then(markdown => {
                    // 1. Pre-process Markdown
                    let processed = markdown;
                    
                    // Specific logic for course notes section format: "=====Section X: Y====="
                    processed = processed.replace(/^=====(Section\s+.*)=====/gm, '## MODULE_MARKER $1');
                    
                    // Original prompt logic
                    processed = processed.replace(/^\s*(Module\s+\d+(\.\d+)?:?)/gm, '## MODULE_MARKER $1');
                    processed = processed.replace(/^##\s+(Topic\s+\d+\.\d+:.*)/gm, '## TOPIC_MARKER $1');
                    processed = processed.replace(/^\s*(\d+\.\d+:)/gm, '**$1**');

                    // 2. Configure Renderer
                    const renderer = new marked.Renderer();
                    
                    renderer.code = function(code, language) {
                        const safeCode = code ? String(code) : '';
                        let highlighted = safeCode;
                        if (language && hljs.getLanguage(language)) {
                            try {
                                highlighted = hljs.highlight(safeCode, { language: language }).value;
                            } catch (e) { highlighted = hljs.highlightAuto(safeCode).value; }
                        } else {
                            highlighted = hljs.highlightAuto(safeCode).value;
                        }
                        
                        return `
                        <pre class="mac-window">
                            <div class="code-header">
                                <div class="window-controls">
                                    <span class="control red"></span>
                                    <span class="control yellow"></span>
                                    <span class="control green"></span>
                                </div>
                                <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                            </div>
                            <code class="hljs language-${language || 'plaintext'}">${highlighted}</code>
                        </pre>`;
                    };
                    
                    let tocHTML = '';

                    renderer.heading = function(text, level) {
                         const safeText = text ? String(text) : '';
                         let cleanText = safeText;
                         let cssClass = '';
                         
                         if (safeText.startsWith('MODULE_MARKER ')) {
                             cleanText = safeText.replace('MODULE_MARKER ', '');
                             cssClass = ' class="module-section"';
                             level = 2; // Override level for CSS targeting
                         } else if (safeText.startsWith('TOPIC_MARKER ')) {
                             cleanText = safeText.replace('TOPIC_MARKER ', '');
                             cssClass = ' class="topic-section"';
                             level = 2; // Override level for CSS targeting
                         }
                         
                         const id = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                         
                         // Generate TOC
                         if (level <= 3) {
                             let tocText = cleanText.replace(/<\/?[^>]+(>|$)/g, ""); // Strip HTML tags
                             tocHTML += `<a href="#${id}" style="padding-left: ${(level-1)*10}px">${tocText}</a>`;
                         }
                         
                         return `<h${level}${cssClass} id="${id}">${cleanText}</h${level}>`;
                    };

                    // 3. Render
                    contentArea.innerHTML = marked.parse(processed, { renderer: renderer });
                    sidebar.innerHTML += tocHTML;

                    loader.style.display = 'none';
                    wrapper.style.display = 'block';
                })
                .catch(error => {
                    contentArea.innerHTML = `<h2 style="color: #ff5f56; padding: 2rem;">Error Loading Notes: ${error.message}</h2>
                                             <p style="padding-left: 2rem; color: var(--text-secondary);">Note: If you opened this file directly in the browser (file:// protocol), fetching the markdown file might be blocked due to CORS policy. Please host this directory using a local web server (like VS Code Live Server, python -m http.server, etc.) to view the notes properly.</p>`;
                    loader.style.display = 'none';
                    wrapper.style.display = 'block';
                });
        });
    </script>
</body>
</html>
