<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Team Operations - Premium Dark Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --text-primary: #ffffff;
            --text-secondary: #e6edf3;
            --accent-blue: #58a6ff;
            --accent-gradient: linear-gradient(135deg, #61dafb 0%, #4facfe 100%);
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: var(--accent-blue);
        }

        .print-wrapper {
            background-color: var(--bg-primary);
            min-height: 100vh;
        }

        .layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            padding: 2rem 1rem;
        }

        .sidebar h3 {
            color: var(--accent-blue);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            margin: 0.5rem 0;
        }

        .sidebar a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .sidebar a:hover {
            color: var(--accent-blue);
        }

        .main-content {
            flex: 1;
            padding: 3rem;
            max-width: 900px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h2 {
            color: var(--text-primary);
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* Module Sections - Big Bold Blue */
        .module-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 6px solid #4facfe;
            padding-left: 1rem;
            margin-top: 4rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Topic Sections - Distinct Vibrant Gradient */
        .topic-section {
            font-family: 'Outfit', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 4px solid #fda085;
            padding-left: 1rem;
            margin-top: 2.5rem;
            margin-bottom: 1.2rem;
            padding-top: 0.2rem;
            padding-bottom: 0.2rem;
            background-color: rgba(253, 160, 133, 0.05);
            border-radius: 0 8px 8px 0;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        /* Ensure normal H3 looks standard */
        h3:not(.topic-section) {
            color: var(--text-primary);
            font-size: 1.4rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.4rem;
        }

        p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        a:hover {
            border-bottom-color: var(--accent-blue);
        }

        ul,
        ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        li {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        pre.mac-window {
            background: #0d1115;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin: 2rem 0;
            white-space: pre-wrap !important;
            word-break: break-word !important;
            overflow-x: hidden !important;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .red {
            background: #ff5f56;
        }

        .yellow {
            background: #ffbd2e;
        }

        .green {
            background: #27c93f;
        }

        .copy-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }

        code {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        p code,
        li code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.85em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        th {
            background: #1c2128;
            color: var(--accent-blue);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(88, 166, 255, 0.06);
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 3rem 0;
        }

        /* CRITICAL PRINT STYLES - DO NOT MODIFY */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { margin: 0; padding: 0; }
            
            .print-wrapper {
                background-color: #0f1115 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                min-height: 100vh;
                width: 100%;
                margin: 0; padding: 0;
            }

            /* Force white text for readability */
            .main-content, p, li, h1, h2, h3, h4, h5, h6, td, th {
                color: #ffffff !important;
            }

            /* Keep code blocks distinct */
            pre {
                border: 1px solid #444;
                page-break-inside: avoid;
            }

            .sidebar, .copy-btn, .window-controls, #loader {
                display: none !important;
            }

            .layout {
                display: block;
            }
            
            .main-content { padding: 2rem !important; margin: 0 auto; max-width: 100%; }
            
            a { text-decoration: none !important; border-bottom: none !important; }

            /* PDF Page Breaking Rules */
            .module-section {
                page-break-before: always; /* Each new section starts on a fresh page */
                margin-top: 0 !important;
            }
            
            h1, h2, h3, h4, h5, h6 {
                page-break-after: avoid; /* Prevent header at the bottom of a page */
            }
            
            pre, blockquote, table, img {
                page-break-inside: avoid; /* Prevent code blocks and tables from splitting across pages */
            }
        }
    </style>
</head>

<body>
    <div id="loader">Loading Red Team Operations Notes...</div>

    <div class="print-wrapper">
        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <h3><i class="fas fa-shield-alt"></i> Table of Contents</h3>
                <ul id="toc"></ul>
            </nav>
            <main class="main-content" id="content-area"></main>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const loader = document.getElementById("loader");
            const contentArea = document.getElementById("content-area");
            const tocArea = document.getElementById("toc");

            try {
                const response = await fetch("Red_Team_Operations_For_Windows_Udemy_Course_Notes.md");
                if (!response.ok && response.status !== 0) throw new Error("Failed to load markdown file");

                let markdown = await response.text();

                let processed = markdown.replace(/^#+\s*(?:.*?\s)?(Module\s+\d+|Section\s+\d+)(.*)/gim, '## MODULE_MARKER $1$2');
                processed = processed.replace(/^\s*(Module\s+\d+.*)/gim, '## MODULE_MARKER $1');
                processed = processed.replace(/^#{3,4}\s+(?!MODULE_MARKER)(.*)/gm, '### TOPIC_MARKER $1');
                processed = processed.replace(/^\s*(\d+\.\d+:)/gm, '**$1**');

                const renderer = new marked.Renderer();

                renderer.code = function (code, language) {
                    const safeCode = code ? String(code) : '';
                    let highlighted = safeCode;
                    let validLang = language || 'plaintext';

                    if (language && hljs.getLanguage(language)) {
                        try {
                            highlighted = hljs.highlight(safeCode, { language: language }).value;
                        } catch (e) {
                            highlighted = hljs.highlightAuto(safeCode).value;
                        }
                    } else {
                        highlighted = hljs.highlightAuto(safeCode).value;
                    }

                    const codeId = 'code-' + Math.random().toString(36).substr(2, 9);

                    return `
                    <pre class="mac-window">
                        <div class="code-header">
                            <div class="window-controls">
                                <span class="control red"></span>
                                <span class="control yellow"></span>
                                <span class="control green"></span>
                            </div>
                            <button class="copy-btn" onclick="copyCode('${codeId}')">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                        <code id="${codeId}" class="hljs language-${validLang}">${highlighted}</code>
                    </pre>`;
                };

                renderer.heading = function (text, level) {
                    const safeText = text ? String(text) : '';
                    let id = safeText.toLowerCase().replace(/[^\w]+/g, '-');
                    let classStr = '';
                    let cleanText = safeText;
                    
                    if (safeText.includes('MODULE_MARKER ')) {
                        cleanText = safeText.replace(/MODULE_MARKER /g, '');
                        id = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                        classStr = ' class="module-section"';
                        level = 2; // enforce level 2
                    }
                    else if (safeText.includes('TOPIC_MARKER ')) {
                        cleanText = safeText.replace(/TOPIC_MARKER /g, '');
                        id = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                        classStr = ' class="topic-section"';
                        level = 3; // enforce level 3
                    }
                    
                    return `<h${level}${classStr} id="${id}">${cleanText}</h${level}>`;
                };

                // GitHub-Style Alerts (Callouts)
                renderer.blockquote = function (quote) {
                    const text = quote ? String(quote) : '';
                    let color = '#58a6ff'; // Default Blue (Note)
                    let bg = 'rgba(88, 166, 255, 0.08)';
                    let title = 'Note';
                    let icon = 'fa-info-circle';
                    
                    let isAlert = false;
                    
                    if (text.includes('[!WARNING]')) { color = '#d29922'; bg = 'rgba(210, 153, 34, 0.1)'; title = 'Warning'; icon = 'fa-triangle-exclamation'; isAlert = true; }
                    else if (text.includes('[!IMPORTANT]')) { color = '#8957e5'; bg = 'rgba(137, 87, 229, 0.1)'; title = 'Important'; icon = 'fa-circle-exclamation'; isAlert = true; }
                    else if (text.includes('[!TIP]') || text.includes('[!SUCCESS]')) { color = '#238636'; bg = 'rgba(35, 134, 54, 0.1)'; title = 'Tip'; icon = 'fa-lightbulb'; isAlert = true; }
                    else if (text.includes('[!CAUTION]') || text.includes('[!DANGER]')) { color = '#da3633'; bg = 'rgba(218, 54, 51, 0.1)'; title = 'Caution'; icon = 'fa-skull-crossbones'; isAlert = true; }
                    else if (text.includes('[!NOTE]')) { isAlert = true; }
                    
                    if (isAlert) {
                        // Strip out the tag whether it's wrapped in a <p> or standalone
                        const cleanText = text.replace(/(<p>)?\s*\[!(NOTE|WARNING|IMPORTANT|TIP|SUCCESS|CAUTION|DANGER)\]\s*(<\/p>|<br>)?/i, '<p>');
                        return `<div style="border-left: 4px solid ${color}; background: ${bg}; padding: 1rem 1.5rem; margin: 1.5rem 0; border-radius: 0 8px 8px 0; page-break-inside: avoid;">
                            <div style="color: ${color}; font-weight: bold; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; font-family: 'Outfit', sans-serif;">
                                <i class="fa-solid ${icon}"></i> ${title}
                            </div>
                            <div style="color: var(--text-secondary); margin: 0;">${cleanText}</div>
                        </div>`;
                    }
                    
                    // Default blockquote behavior
                    return `<blockquote>${text}</blockquote>`;
                };

                contentArea.innerHTML = marked.parse(processed, { renderer: renderer });

                const headings = contentArea.querySelectorAll('h2, h3');
                headings.forEach(heading => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = '#' + heading.id;
                    a.textContent = heading.textContent;
                    if (heading.tagName === 'H3') {
                        a.style.paddingLeft = '1rem';
                        a.style.fontSize = '0.85rem';
                    }
                    li.appendChild(a);
                    tocArea.appendChild(li);
                });

                loader.style.display = "none";

            } catch (error) {
                loader.textContent = "Error loading notes: " + error.message;
                loader.style.color = "#ff5f56";
            }
        });

        function copyCode(codeId) {
            const codeBlock = document.getElementById(codeId);
            const text = codeBlock.textContent;

            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target.closest('.copy-btn');
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }
    </script>
</body>

</html>
