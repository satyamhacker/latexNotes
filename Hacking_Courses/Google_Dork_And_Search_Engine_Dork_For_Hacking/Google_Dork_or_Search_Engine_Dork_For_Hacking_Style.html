<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Dork Notes</title>
    
    <!-- Required Dependencies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Color Palette - Deep Dark Theme */
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --text-primary: #ffffff; /* Pure white for better readability */
            --text-secondary: #e6edf3; /* Much brighter grey */
            --accent-blue: #58a6ff;
            --accent-gradient: linear-gradient(135deg, #61dafb 0%, #4facfe 100%);
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        h2 {
            color: var(--text-primary);
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* Module Sections - Big Bold Blue */
        .module-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 6px solid #4facfe;
            padding-left: 1rem;
            margin-top: 4rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: none;
        }

        /* Topic Sections - Distinct Vibrant Gradient */
        .topic-section {
            font-family: 'Outfit', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); /* Orange-ish gradient */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 4px solid #fda085;
            padding-left: 1rem;
            margin-top: 2.5rem;
            margin-bottom: 1.2rem;
            padding-top: 0.2rem;
            padding-bottom: 0.2rem;
            background-color: rgba(253, 160, 133, 0.05); /* very subtle background for depth */
            border-radius: 0 8px 8px 0;
            display: inline-block; /* Makes background fit the text width + padding */
            width: 100%;
            box-sizing: border-box;
        }

        /* Ensure normal H3 looks standard */
        h3:not(.topic-section) {
            color: var(--text-primary);
            font-size: 1.4rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.4rem;
        }

        p {
            margin: 1rem 0;
            color: var(--text-secondary);
        }

        ul, ol {
            margin: 1rem 0 1rem 2rem;
            color: var(--text-secondary);
        }

        li {
            margin: 0.5rem 0;
        }

        /* Mac-Style Code Blocks */
        pre.mac-window {
            background: #0d1115;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 2rem 0;
            
            /* STRICT WRAPPING FOR PDF */
            white-space: pre-wrap !important;
            word-break: break-word !important; 
            overflow-x: hidden !important;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between;
            align-items: center;
        }

        /* Dots helper */
        .window-controls { display: flex; gap: 6px; }
        .control { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        .copy-btn {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }

        code {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap !important; 
            word-wrap: break-word !important;
        }

        pre code {
            display: block;
            padding: 1.5rem;
            overflow-x: auto;
            background: transparent;
        }

        /* Inline Code Styling */
        p code, li code, td code {
            background-color: rgba(88, 166, 255, 0.15);
            color: #79c0ff;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-size: 0.9em;
            font-family: 'Fira Code', monospace;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        th {
            background: #1c2128;
            color: var(--accent-blue);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
            height: 100vh;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            color: var(--accent-blue);
            margin-top: 0;
            margin-bottom: 1rem;
            font-weight: 600;
            border: none;
        }

        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin: 0.5rem 0; }

        .sidebar a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: background 0.2s, color 0.2s;
            border-bottom: none;
        }

        .sidebar a:hover {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-blue);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* Content Links */
        .main-content a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px dashed rgba(88, 166, 255, 0.5);
            transition: all 0.2s;
        }
        .main-content a:hover {
            color: #79c0ff;
            border-bottom: 1px solid #79c0ff;
        }

        /* Images */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin: 1.5rem 0;
            border: 1px solid var(--border-color);
        }

        /* Task Lists / Checkboxes */
        input[type="checkbox"] {
            accent-color: #58a6ff;
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 0.5rem;
            cursor: pointer;
            position: relative;
            top: 2px;
        }

        /* Blockquote */
        blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(88, 166, 255, 0.06);
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--accent-blue);
            z-index: 9999;
        }

        /* CRITICAL PRINT STYLES - DO NOT MODIFY */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { margin: 0; padding: 0; }
            
            .print-wrapper {
                background-color: #0f1115 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                min-height: 100vh;
                width: 100%;
                margin: 0; padding: 0;
            }

            /* Force white text for readability */
            .main-content, p, li, h1, h2, h3, h4, h5, h6, td, th {
                color: #ffffff !important;
            }

            /* Keep code blocks distinct */
            pre {
                border: 1px solid #444;
                page-break-inside: avoid;
            }

            .sidebar, .copy-btn, .window-controls, #loader {
                display: none !important;
            }

            .layout {
                display: block;
            }
            
            .main-content { padding: 2rem !important; margin: 0 auto; max-width: 100%; }
            
            a { text-decoration: none !important; border-bottom: none !important; }

            /* PDF Page Breaking Rules */
            .module-section {
                page-break-before: always; /* Each new section starts on a fresh page */
                margin-top: 0 !important;
            }
            
            h1, h2, h3, h4, h5, h6 {
                page-break-after: avoid; /* Prevent header at the bottom of a page */
            }
            
            pre, blockquote, table, img {
                page-break-inside: avoid; /* Prevent code blocks and tables from splitting across pages */
            }
        }
    </style>
</head>
<body>
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
    
    <!-- WRAPPER IS MANDATORY FOR PRINTING BACKGROUNDS -->
    <div class="print-wrapper">
        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <h2><i class="fas fa-list"></i> Contents</h2>
                <ul id="toc"></ul>
            </nav>
            <main class="main-content" id="content-area">
                <!-- Markdown content goes here -->
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contentArea = document.getElementById("content-area");
            const toc = document.getElementById("toc");
            const loader = document.getElementById("loader");

            fetch("Google_Dork_And_Search_Engine_Dork_For_Hacking.md")
                .then(response => response.ok ? response.text() : Promise.reject("Failed to load markdown file"))
                .then(markdown => {
                    // 1. Pre-process Markdown (Universal Module & Topic Catcher)
                    let processed = markdown.replace(/^#+\s*(?:.*?\s)?(Module\s+\d+|Section\s+\d+)(.*)/gim, '## MODULE_MARKER $1$2');
                    processed = processed.replace(/^\s*(Module\s+\d+.*)/gim, '## MODULE_MARKER $1');
                    processed = processed.replace(/^#{3,4}\s+(?!MODULE_MARKER)(.*)/gm, '### TOPIC_MARKER $1');
                    processed = processed.replace(/^\s*(\d+\.\d+:)/gm, '**$1**');

                    // 2. Configure Renderer
                    const renderer = new marked.Renderer();
                    
                    renderer.code = function(code, language) {
                        const safeCode = code ? String(code) : '';
                        let highlighted = safeCode;
                        if (language && hljs.getLanguage(language)) {
                            try {
                                highlighted = hljs.highlight(safeCode, { language: language }).value;
                            } catch (e) { highlighted = hljs.highlightAuto(safeCode).value; }
                        } else {
                            highlighted = hljs.highlightAuto(safeCode).value;
                        }
                        
                        const randomId = Math.random().toString(36).substr(2, 9);
                        return \`
                        <pre class="mac-window">
                            <div class="code-header">
                                <div class="window-controls">
                                    <span class="control red"></span>
                                    <span class="control yellow"></span>
                                    <span class="control green"></span>
                                </div>
                                <button class="copy-btn" onclick="copyCode('\${randomId}')"><i class="fas fa-copy"></i> Copy</button>
                            </div>
                            <code id="\${randomId}" class="hljs language-\${language || 'plaintext'}">\${highlighted}</code>
                        </pre>\`;
                    };
                    
                    renderer.heading = function(text, level) {
                         const safeText = text ? String(text) : '';
                         let id = safeText.toLowerCase().replace(/[^\\w]+/g, '-');
                         let classStr = '';
                         let cleanText = safeText;
                         
                         if (safeText.includes('MODULE_MARKER ')) {
                             cleanText = safeText.replace(/MODULE_MARKER /g, '');
                             id = cleanText.toLowerCase().replace(/[^\\w]+/g, '-');
                             classStr = ' class="module-section"';
                             level = 2;
                         }
                         else if (safeText.includes('TOPIC_MARKER ')) {
                             cleanText = safeText.replace(/TOPIC_MARKER /g, '');
                             id = cleanText.toLowerCase().replace(/[^\\w]+/g, '-');
                             classStr = ' class="topic-section"';
                             level = 3;
                         }
                         
                         return \`<h\${level}\${classStr} id="\${id}">\${cleanText}</h\${level}>\`;
                    };

                    // GitHub-Style Alerts
                    renderer.blockquote = function(quote) {
                        const text = quote ? String(quote) : '';
                        let color = '#58a6ff';
                        let bg = 'rgba(88, 166, 255, 0.08)';
                        let title = 'Note';
                        let icon = 'fa-info-circle';
                        let isAlert = false;
                        
                        if (text.includes('[!WARNING]')) { color = '#d29922'; bg = 'rgba(210, 153, 34, 0.1)'; title = 'Warning'; icon = 'fa-triangle-exclamation'; isAlert = true; }
                        else if (text.includes('[!IMPORTANT]')) { color = '#8957e5'; bg = 'rgba(137, 87, 229, 0.1)'; title = 'Important'; icon = 'fa-circle-exclamation'; isAlert = true; }
                        else if (text.includes('[!TIP]') || text.includes('[!SUCCESS]')) { color = '#238636'; bg = 'rgba(35, 134, 54, 0.1)'; title = 'Tip'; icon = 'fa-lightbulb'; isAlert = true; }
                        else if (text.includes('[!CAUTION]') || text.includes('[!DANGER]')) { color = '#da3633'; bg = 'rgba(218, 54, 51, 0.1)'; title = 'Caution'; icon = 'fa-skull-crossbones'; isAlert = true; }
                        else if (text.includes('[!NOTE]')) { isAlert = true; }
                        
                        if (isAlert) {
                            const cleanText = text.replace(/(<p>)?\\s*\\[!(NOTE|WARNING|IMPORTANT|TIP|SUCCESS|CAUTION|DANGER)\\]\\s*(<\\/p>|<br>)?/i, '<p>');
                            return \`<div style="border-left: 4px solid \${color}; background: \${bg}; padding: 1rem 1.5rem; margin: 1.5rem 0; border-radius: 0 8px 8px 0; page-break-inside: avoid;">
                                <div style="color: \${color}; font-weight: bold; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; font-family: 'Outfit', sans-serif;">
                                    <i class="fa-solid \${icon}"></i> \${title}
                                </div>
                                <div style="color: var(--text-secondary); margin: 0;">\${cleanText}</div>
                            </div>\`;
                        }
                        
                        return \`<blockquote>\${text}</blockquote>\`;
                    };

                    // 3. Render
                    marked.setOptions({ renderer: renderer, breaks: true, gfm: true });
                    contentArea.innerHTML = marked.parse(processed);

                    // 4. Generate TOC
                    const headings = contentArea.querySelectorAll("h1, h2, h3");
                    headings.forEach(h => {
                        const li = document.createElement("li");
                        const a = document.createElement("a");
                        a.href = \`#\${h.id}\`;
                        a.textContent = h.textContent;
                        a.style.paddingLeft = h.tagName === "H1" ? "0" : h.tagName === "H2" ? "1rem" : "2rem";
                        li.appendChild(a);
                        toc.appendChild(li);
                    });

                    loader.style.display = "none";
                })
                .catch(err => {
                    console.error(err);
                    loader.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading notes';
                });
        });

        function copyCode(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const text = el.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target.closest(".copy-btn");
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copy'; }, 2000);
            }).catch(err => console.error("Copy failed:", err));
        }
    </script>
</body>
</html>
