<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Course Notes</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Highlight CSS (Atom One Dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">
    
    <style>
        :root {
            /* Color Palette - Deep Dark Theme */
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --text-primary: #ffffff; /* Pure white for better readability */
            --text-secondary: #e6edf3; /* Much brighter grey */
            --accent-blue: #58a6ff;
            --accent-gradient: linear-gradient(135deg, #61dafb 0%, #4facfe 100%);
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: var(--text-secondary);
            z-index: 1000;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            border-bottom: 3px solid var(--border-color);
            margin-top: 2rem;
            padding-bottom: 0.5rem;
        }

        h2 {
            color: var(--text-primary);
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        /* Module Sections - Big Bold Blue */
        .module-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 6px solid #4facfe;
            padding-left: 1rem;
            margin-top: 4rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Topic Sections - Distinct Vibrant Gradient */
        .topic-section {
            font-family: 'Outfit', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); /* Orange-ish gradient */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 4px solid #fda085;
            padding-left: 1rem;
            margin-top: 2.5rem;
            margin-bottom: 1.2rem;
            padding-top: 0.2rem;
            padding-bottom: 0.2rem;
            background-color: rgba(253, 160, 133, 0.05); /* very subtle background for depth */
            border-radius: 0 8px 8px 0;
            display: inline-block; /* Makes background fit the text width + padding */
            width: 100%;
            box-sizing: border-box;
        }

        /* Ensure normal H3 looks standard */
        h3:not(.topic-section) {
            color: var(--text-primary);
            font-size: 1.4rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.4rem;
        }

        /* Mac-Style Code Blocks */
        pre.mac-window {
            background: #0d1115;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 2rem 0;
            
            /* STRICT WRAPPING FOR PDF */
            white-space: pre-wrap !important;
            word-break: break-word !important; 
            overflow-x: hidden !important;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between;
            align-items: center;
        }

        /* Dots helper (add these classes too) */
        .control { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        code {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap !important; 
            word-wrap: break-word !important;
        }

        /* Inline Code Styling */
        p code, li code, td code {
            background-color: rgba(88, 166, 255, 0.15);
            color: #79c0ff;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-size: 0.9em;
            font-family: 'Fira Code', monospace;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }
        
        pre code {
            padding: 1.5rem !important;
            background: transparent;
            display: block;
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        th {
            background: #1c2128;
            color: var(--accent-blue);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-top: 0;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .sidebar a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: background 0.2s, color 0.2s;
            margin-bottom: 2px;
        }

        .sidebar a:hover {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-blue);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        /* Content Links */
        .main-content a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px dashed rgba(88, 166, 255, 0.5);
            transition: all 0.2s;
        }
        .main-content a:hover {
            color: #79c0ff;
            border-bottom: 1px solid #79c0ff;
        }

        /* Images */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin: 1.5rem 0;
            border: 1px solid var(--border-color);
        }

        /* Task Lists / Checkboxes */
        input[type="checkbox"] {
            accent-color: #58a6ff;
            width: 1.2rem;
            height: 1.2rem;
            margin-right: 0.5rem;
            cursor: pointer;
            position: relative;
            top: 2px;
        }

        /* Blockquote */
        blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(88, 166, 255, 0.06);
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* CRITICAL PRINT STYLES - DO NOT MODIFY */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { margin: 0; padding: 0; }
            
            .print-wrapper {
                background-color: #0f1115 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                min-height: 100vh;
                width: 100%;
                margin: 0; padding: 0;
            }

            /* Force white text for readability */
            .main-content, p, li, h1, h2, h3, h4, h5, h6, td, th {
                color: #ffffff !important;
            }

            /* Keep code blocks distinct */
            pre {
                border: 1px solid #444;
                page-break-inside: avoid;
            }

            .sidebar, .copy-btn, .window-controls, #loader {
                display: none !important;
            }

            .layout {
                display: block;
            }
            
            .main-content { padding: 2rem !important; margin: 0 auto; max-width: 100%; }
            
            a { text-decoration: none !important; border-bottom: none !important; }

            /* PDF Page Breaking Rules */
            .module-section {
                page-break-before: always; /* Each new section starts on a fresh page */
                margin-top: 0 !important;
            }
            
            h1, h2, h3, h4, h5, h6 {
                page-break-after: avoid; /* Prevent header at the bottom of a page */
            }
            
            pre, blockquote, table, img {
                page-break-inside: avoid; /* Prevent code blocks and tables from splitting across pages */
            }
        }

        /* 🟡 PREMIUM HIGHLIGHT STYLES */
        mark.yellow-highlight {
            background-color: rgba(253, 224, 71, 0.2) !important;
            color: #fde047 !important;
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-weight: 600;
            box-shadow: 0 0 8px rgba(253, 224, 71, 0.1);
        }

        @media print {
            mark.yellow-highlight {
                background-color: #fff000 !important;
                color: #000000 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader">Loading and processing notes...</div>
    
    <!-- WRAPPER IS MANDATORY FOR PRINTING BACKGROUNDS -->
    <div class="print-wrapper">
        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <!-- TOC goes here -->
            </nav>
            <main class="main-content" id="content-area">
                <!-- Markdown content goes here -->
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const contentArea = document.getElementById("content-area");
            const loader = document.getElementById("loader");
            const sidebar = document.getElementById("sidebar");

            // Fetch MD logic (with local file support)
            fetch("OSINT_Course_Udemy_Zaidh_Sabih.md")
                .then(response => {
                    // Support local file:/// protocols where status is 0
                    if (!response.ok && response.status !== 0) {
                        throw new Error("Failed to load markdown file");
                    }
                    return response.text();
                })
                .then(markdown => {
            
                    // Pre-process Markdown for OSINT Course format
                    let processed = markdown;
                    
                    // Convert H1 to MODULE_MARKER (so it can be identified for TOC)
                    processed = processed.replace(/^#\s+(.*)/gm, '## MODULE_MARKER $1');
                    
                    // The markdown skips H2 and uses H3 for everything.
                    // Convert H3 to TOPIC_MARKER to apply topic styling
                    processed = processed.replace(/^###\s+(.*)/gm, '### TOPIC_MARKER $1');

                    // Converts "1.1:" to bold for better readability
                    processed = processed.replace(/^\s*(\d+\.\d+:)/gm, '**$1**');

                    // Set up TOC array
                    const toc = [];

                    // Configure Renderer
                    const renderer = new marked.Renderer();
                    
                    // Safety check: Cast code to string to avoid [object Object] crash
                    renderer.code = function(code, language) {
                        const safeCode = code ? String(code) : '';
                        
                        // 🟡 1. Extract highlights BEFORE hljs runs to protect them
                        let hlCount = 0;
                        let hlMap = {};
                        let rawCode = safeCode.replace(/\[\[HL::(.*?)::HL\]\]/g, function(match, p1) {
                            let key = `__HL_${hlCount}__`;
                            hlMap[key] = p1;
                            hlCount++;
                            return key;
                        });

                        // 2. Robust highlighting with Auto-detection
                        let highlighted = rawCode;
                        if (language && hljs.getLanguage(language)) {
                            try {
                                highlighted = hljs.highlight(rawCode, { language: language }).value;
                            } catch (e) { highlighted = hljs.highlightAuto(rawCode).value; }
                        } else {
                            highlighted = hljs.highlightAuto(rawCode).value;
                        }
                        
                        // 🟡 3. Restore highlights as HTML tags safely
                        for (let i = 0; i < hlCount; i++) {
                            let key = `__HL_${i}__`;
                            highlighted = highlighted.replace(key, `<mark class="yellow-highlight">${hlMap[key]}</mark>`);
                        }
                        
                        return `
                        <pre class="mac-window">
                            <div class="code-header">
                                <div class="window-controls">
                                    <span class="control red"></span>
                                    <span class="control yellow"></span>
                                    <span class="control green"></span>
                                </div>
                                <button class="copy-btn" onclick="copyCode(this)">Copy</button>
                            </div>
                            <code class="hljs language-${language || 'plaintext'}">${highlighted}</code>
                        </pre>`;
                    };
                    
                    renderer.heading = function(text, level) {
                        const safeText = text ? String(text) : '';
                        let id = safeText.toLowerCase().replace(/[^\w]+/g, '-');
                        let classStr = '';
                        let cleanText = safeText;
                        
                        if (safeText.includes('MODULE_MARKER ')) {
                            cleanText = safeText.replace(/MODULE_MARKER /g, '');
                            id = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                            classStr = ' class="module-section"';
                            level = 2; // enforce level 2
                            
                            const textContent = cleanText.replace(/<[^>]+>/g, '');
                            toc.push({ level: 1, id, text: textContent });
                        }
                        else if (safeText.includes('TOPIC_MARKER ')) {
                            cleanText = safeText.replace(/TOPIC_MARKER /g, '');
                            id = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                            classStr = ' class="topic-section"';
                            level = 3; // enforce level 3
                            
                            const textContent = cleanText.replace(/<[^>]+>/g, '');
                            toc.push({ level: 2, id, text: textContent });
                        }
                        else {
                            if (level === 1) {
                                const textContent = cleanText.replace(/<[^>]+>/g, '');
                                toc.push({ level: 1, id, text: textContent });
                            }
                        }
                        
                        return `<h${level}${classStr} id="${id}">${cleanText}</h${level}>`;
                    };

                    // GitHub-Style Alerts (Callouts)
                    renderer.blockquote = function(quote) {
                        const text = quote ? String(quote) : '';
                        let color = '#58a6ff'; // Default Blue (Note)
                        let bg = 'rgba(88, 166, 255, 0.08)';
                        let title = 'Note';
                        let icon = 'fa-info-circle';
                        
                        let isAlert = false;
                        
                        if (text.includes('[!WARNING]')) { color = '#d29922'; bg = 'rgba(210, 153, 34, 0.1)'; title = 'Warning'; icon = 'fa-triangle-exclamation'; isAlert = true; }
                        else if (text.includes('[!IMPORTANT]')) { color = '#8957e5'; bg = 'rgba(137, 87, 229, 0.1)'; title = 'Important'; icon = 'fa-circle-exclamation'; isAlert = true; }
                        else if (text.includes('[!TIP]') || text.includes('[!SUCCESS]')) { color = '#238636'; bg = 'rgba(35, 134, 54, 0.1)'; title = 'Tip'; icon = 'fa-lightbulb'; isAlert = true; }
                        else if (text.includes('[!CAUTION]') || text.includes('[!DANGER]')) { color = '#da3633'; bg = 'rgba(218, 54, 51, 0.1)'; title = 'Caution'; icon = 'fa-skull-crossbones'; isAlert = true; }
                        else if (text.includes('[!NOTE]')) { isAlert = true; }
                        
                        if (isAlert) {
                            // Strip out the tag whether it's wrapped in a <p> or standalone
                            const cleanText = text.replace(/(<p>)?\s*\[!(NOTE|WARNING|IMPORTANT|TIP|SUCCESS|CAUTION|DANGER)\]\s*(<\/p>|<br>)?/i, '<p>');
                            return `<div style="border-left: 4px solid ${color}; background: ${bg}; padding: 1rem 1.5rem; margin: 1.5rem 0; border-radius: 0 8px 8px 0; page-break-inside: avoid;">
                                <div style="color: ${color}; font-weight: bold; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; font-family: 'Outfit', sans-serif;">
                                    <i class="fa-solid ${icon}"></i> ${title}
                                </div>
                                <div style="color: var(--text-secondary); margin: 0;">${cleanText}</div>
                            </div>`;
                        }
                        
                        // Default blockquote behavior
                        return `<blockquote>${text}</blockquote>`;
                    };

                    // Render
                    let finalHtml = marked.parse(processed, { renderer: renderer });
                    
                    // Replace remaining [[HL::text::HL]] outside of code blocks
                    finalHtml = finalHtml.replace(/\[\[HL::(.*?)::HL\]\]/g, '<mark class="yellow-highlight">$1</mark>');
                    
                    contentArea.innerHTML = finalHtml;

                    // Build TOC HTML
                    let tocHTML = '<h2>Table of Contents</h2>';
                    toc.forEach(item => {
                        const style = item.level === 2 
                            ? 'style="padding-left: 1.5rem; font-size: 0.8rem; color: var(--text-secondary);"' 
                            : 'style="margin-top: 1rem; font-weight: 600; color: white;"';
                        tocHTML += `<a href="#${item.id}" ${style}>${item.text}</a>`;
                    });
                    sidebar.innerHTML = tocHTML;

                    // Hide Loader
                    loader.style.display = 'none';
                })
                .catch(err => {
                    console.error(err);
                    loader.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading notes (Is CORS blocking local files?)';
                });
        });

        // Copy Code Functionality
        window.copyCode = function(btn) {
            const code = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => { btn.innerText = originalText; }, 2000);
            });
        };
    </script>
</body>
</html>
