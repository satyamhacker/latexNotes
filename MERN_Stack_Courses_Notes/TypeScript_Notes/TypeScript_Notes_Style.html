<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Notes - Premium Dark Mode</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">
    
    <style>
        :root {
            /* Color Palette - Deep Dark Theme */
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --text-primary: #ffffff; /* Pure white for better readability */
            --text-secondary: #e6edf3; /* Much brighter grey */
            --accent-blue: #58a6ff;
            --accent-gradient: linear-gradient(135deg, #61dafb 0%, #4facfe 100%);
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: var(--accent-blue);
            z-index: 9999;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            border-bottom: 3px solid var(--border-color);
            margin-bottom: 1.5rem;
        }

        h2 {
            color: var(--text-primary);
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        
        h3 {
            color: var(--text-secondary);
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        
        p, ul, ol {
            margin-bottom: 1.2rem;
            color: var(--text-secondary);
        }
        
        li {
            margin-bottom: 0.5rem;
        }
        
        strong {
            color: var(--text-primary);
        }

        /* Module Sections - Big Bold Blue */
        .module-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 5px solid #4facfe;
            padding-left: 1.2rem;
            margin-top: 4rem;
            margin-bottom: 1.5rem;
            page-break-after: avoid;
            break-after: avoid;
        }

        /* Topic Sections - Premium Purple Gradient Text */
        .topic-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #a855f7;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 5px solid #a855f7;
            padding-left: 1rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            page-break-after: avoid;
            break-after: avoid;
        }

        /* Mac-Style Code Blocks */
        pre.mac-window {
            background: #0d1115;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 2rem 0;
            
            /* STRICT WRAPPING FOR PDF */
            white-space: pre-wrap !important;
            word-break: break-word !important; 
            overflow-x: hidden !important;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between;
            align-items: center;
        }

        /* Dots helper */
        .control { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        code {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap !important; 
            word-wrap: break-word !important;
        }
        
        p > code, li > code {
            background: rgba(110, 118, 129, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        th {
            background: #1c2128;
            color: var(--accent-blue);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            color: var(--accent-blue);
            font-family: 'Outfit', sans-serif;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: background 0.2s, color 0.2s;
            margin-bottom: 0.2rem;
        }

        .sidebar a:hover {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-blue);
        }
        
        .sidebar a.module {
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 1rem;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            padding-bottom: 0.5rem;
            border-radius: 0;
        }
        
        .sidebar a.module:hover {
            background: transparent;
            color: var(--accent-blue);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Blockquote */
        blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(88, 166, 255, 0.06);
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        /* Copy button */
        .copy-btn {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .copy-btn:hover {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        /* CRITICAL PRINT STYLES - DO NOT MODIFY */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { margin: 0; padding: 0; }
            
            .print-wrapper {
                background-color: #0f1115 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                min-height: 100vh;
                width: 100%;
                position: absolute; top: 0; left: 0;
                margin: 0; padding: 0;
            }

            /* Force white text for readability */
            .main-content, p, li, h1, h2, h3, h4, h5, h6, td, th {
                color: #ffffff !important;
            }

            /* Keep code blocks distinct */
            pre {
                border: 1px solid #444;
                page-break-inside: avoid;
            }

            .sidebar, .copy-btn, .window-controls, #loader {
                display: none !important;
            }

            .layout {
                display: block;
            }
            
            .main-content { padding: 2rem !important; margin: 0 auto; max-width: 100%; }
            
            a { text-decoration: none !important; border-bottom: none !important; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                min-height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 1.5rem;
            }
            .main-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="loader">
        <i class="fas fa-spinner fa-spin" style="margin-bottom: 1rem;"></i> 
        <div>Loading Notes...</div>
    </div>
    
    <!-- WRAPPER IS MANDATORY FOR PRINTING BACKGROUNDS -->
    <div class="print-wrapper">
        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-book-open"></i> Table of Contents
                </div>
                <div id="toc-container"></div>
            </nav>
            <main class="main-content" id="content-area">
                <!-- Markdown content goes here -->
            </main>
        </div>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <script>
        // Copy function defined globally so inline handlers can access it
        window.copyCode = function(button) {
            const codeBlock = button.parentElement.nextElementSibling;
            const code = codeBlock.textContent;
            navigator.clipboard.writeText(code).then(() => {
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check"></i> Copied!';
                button.style.color = 'var(--accent-blue)';
                button.style.borderColor = 'var(--accent-blue)';
                
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.style.color = '';
                    button.style.borderColor = '';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                button.textContent = 'Failed';
            });
        };

        document.addEventListener("DOMContentLoaded", async () => {
            const loader = document.getElementById('loader');
            const contentArea = document.getElementById('content-area');
            const tocContainer = document.getElementById('toc-container');
            
            try {
                // Fetch MD logic
                const response = await fetch('./TypeScript_Notes.md');
                if (!response.ok) {
                    throw new Error(`Failed to load markdown file: ${response.status}`);
                }
                const markdown = await response.text();
                
                // 1. Pre-process Markdown (Fix headings for styling)
                // Converts "Module X:" or "**Module X:**" to "## MODULE_MARKER Module X:"
                let processed = markdown.replace(/^(?:#+\s*)?(?:\*\*\s*)?(Module\s+\d+.*?)(?:\s*\*\*)?$/gmi, '## MODULE_MARKER $1');
                // Converts "#### 🎯 Topic:" or "**Topic:**" to "### TOPIC_MARKER Topic:"
                processed = processed.replace(/^(?:#+\s*)?(?:🎯\s*)?(?:\*\*\s*)?(Topic\s*:?.*?)(?:\s*\*\*)?$/gmi, '### TOPIC_MARKER $1');
                // Converts "1.1:" to bold
                processed = processed.replace(/^\s*(\d+\.\d+:)/gm, '**$1**');

                // 2. Configure Renderer
                const renderer = new marked.Renderer();
                
                // Safety check: Cast code to string to avoid [object Object] crash
                renderer.code = function(code, language) {
                    const safeCode = code ? String(code) : '';
                    // Robust highlighting with Auto-detection
                    let highlighted = safeCode;
                    // If language is provided and valid, use it
                    if (language && hljs.getLanguage(language)) {
                        try {
                            highlighted = hljs.highlight(safeCode, { language: language }).value;
                        } catch (e) { highlighted = hljs.highlightAuto(safeCode).value; }
                    } else {
                        // Otherwise, or if 'plaintext', force auto-detection
                        highlighted = hljs.highlightAuto(safeCode).value;
                    }
                    
                    return `
                    <pre class="mac-window">
                        <div class="code-header">
                            <div class="window-controls">
                                <span class="control red"></span>
                                <span class="control yellow"></span>
                                <span class="control green"></span>
                            </div>
                            <button class="copy-btn" onclick="copyCode(this)">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                        <code class="hljs language-${language || 'plaintext'}">${highlighted}</code>
                    </pre>`;
                };
                
                renderer.heading = function(text, level) {
                     const safeText = text ? String(text) : '';
                     const id = safeText.toLowerCase().replace(/[^\w]+/g, '-');
                     
                     // Check if this is a Module section
                     if (safeText.startsWith('MODULE_MARKER ')) {
                         const cleanText = safeText.replace('MODULE_MARKER ', '');
                         const cleanId = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                         return `<h${level} class="module-section" id="${cleanId}">${cleanText}</h${level}>`;
                     }
                     
                     // Check if this is a Topic section
                     if (safeText.startsWith('TOPIC_MARKER ')) {
                         const cleanText = safeText.replace('TOPIC_MARKER ', '');
                         const cleanId = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                         return `<h${level} class="topic-section" id="${cleanId}">${cleanText}</h${level}>`;
                     }
                     
                     return `<h${level} id="${id}">${safeText}</h${level}>`;
                };

                marked.setOptions({
                    renderer: renderer,
                    breaks: true,
                    gfm: true
                });

                // 3. Render
                contentArea.innerHTML = marked.parse(processed);
                
                // 4. Generate TOC
                generateTOC();
                
                // 5. Hide Loader
                loader.style.display = 'none';

            } catch (error) {
                console.error('Error:', error);
                contentArea.innerHTML = `
                    <div style="text-align: center; padding: 4rem 2rem; background: #161b22; border-radius: 8px; border: 1px solid #30363d; margin-top: 2rem;">
                        <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ff5f56; margin-bottom: 1rem;"></i>
                        <h2 style="border: none; margin-top: 0;">Error Loading Notes</h2>
                        <p style="color: #e6edf3;">Could not load the file <strong>TypeScript_Notes.md</strong>.</p>
                        <p style="color: #8b949e; margin-top: 1rem; font-size: 0.9rem;">Make sure the Markdown file exists in the same folder as this HTML file.</p>
                        <div style="margin-top: 2rem; padding: 1rem; background: #0d1115; border-radius: 6px; font-family: monospace; font-size: 0.8rem; color: #ff5f56; word-break: break-all;">
                            ${error.message}
                        </div>
                    </div>`;
                loader.style.display = 'none';
            }
        });
        
        function generateTOC() {
            const tocContainer = document.getElementById('toc-container');
            const headings = document.querySelectorAll('.main-content h1, .main-content h2, .main-content h3');
            
            let tocHTML = '';
            
            headings.forEach(heading => {
                const text = heading.textContent;
                const id = heading.id;
                const level = heading.tagName.toLowerCase();
                
                if(!id) return;
                
                let className = '';
                if (heading.classList.contains('module-section')) {
                    className = 'module';
                } else if (heading.classList.contains('topic-section')) {
                    className = 'topic';
                }
                
                // Indent based on level if it's not a module/topic special class
                let style = '';
                if (level === 'h3') {
                    style = 'style="padding-left: 1.5rem; font-size: 0.8rem;"';
                } else if (level === 'h2' && !className) {
                    style = 'style="padding-left: 0.5rem;"';
                }
                
                tocHTML += `<a href="#${id}" class="${className}" ${style}>${text}</a>`;
            });
            
            tocContainer.innerHTML = tocHTML;
            
            // Smooth scroll
            document.querySelectorAll('#toc-container a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({ 
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        }
    </script>
</body>
</html>
