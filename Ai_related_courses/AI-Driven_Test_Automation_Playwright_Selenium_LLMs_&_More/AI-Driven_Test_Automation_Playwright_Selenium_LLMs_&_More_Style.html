<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Driven Test Automation Notes</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0f1115;
            --bg-secondary: #161b22;
            --text-primary: #ffffff;
            --text-secondary: #e6edf3;
            --accent-blue: #58a6ff;
            --accent-gradient: linear-gradient(135deg, #61dafb 0%, #4facfe 100%);
            --border-color: #30363d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: var(--accent-blue);
            z-index: 9999;
        }

        .print-wrapper {
            background-color: var(--bg-primary);
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h3 {
            color: var(--accent-blue);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.875rem;
            transition: background 0.2s, color 0.2s;
            margin-bottom: 0.25rem;
        }

        .sidebar a:hover {
            background: rgba(88, 166, 255, 0.12);
            color: var(--accent-blue);
        }

        .main-content {
            flex: 1;
            padding: 3rem 4rem;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        h2 {
            color: var(--text-primary);
            font-size: 2rem;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        h2.topic-section, h2.module-section {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            border-left: 5px solid #4facfe;
            padding-left: 1rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
        }

        h3 {
            color: var(--accent-blue);
            font-size: 1.5rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        h4 {
            color: var(--text-secondary);
            font-size: 1.25rem;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        p {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        pre.mac-window {
            background: #0d1115;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 2rem 0;
            white-space: pre-wrap !important;
            word-break: break-word !important;
            overflow-x: hidden !important;
        }

        .code-header {
            background: #161b22;
            padding: 8px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-controls {
            display: flex;
            gap: 6px;
        }

        .control {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .copy-btn {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--accent-blue);
            color: var(--bg-primary);
        }

        code {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            font-size: 0.9rem;
        }

        p code, li code {
            background: rgba(88, 166, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--accent-blue);
            font-size: 0.875rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        th {
            background: #1c2128;
            color: var(--accent-blue);
            font-weight: 600;
        }

        tr:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(88, 166, 255, 0.06);
            margin: 1.5rem 0;
            padding: 1rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        ul, ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
        }

        li {
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        a:hover {
            border-bottom-color: var(--accent-blue);
        }

        strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 2rem 0;
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body { margin: 0; padding: 0; }
            
            .print-wrapper {
                background-color: #0f1115 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                min-height: 100vh;
                width: 100%;
                position: absolute;
                top: 0;
                left: 0;
                margin: 0;
                padding: 0;
            }

            .main-content, p, li, h1, h2, h3, h4, h5, h6, td, th {
                color: #ffffff !important;
            }

            pre {
                border: 1px solid #444;
                page-break-inside: avoid;
            }

            .sidebar, .copy-btn, .window-controls, #loader {
                display: none !important;
            }

            .layout {
                display: block;
            }
            
            .main-content {
                padding: 2rem !important;
                margin: 0 auto;
                max-width: 100%;
            }
            
            a {
                text-decoration: none !important;
                border-bottom: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="loader">Loading Notes...</div>
    
    <div class="print-wrapper">
        <div class="layout">
            <nav class="sidebar" id="sidebar">
                <h3><i class="fas fa-book"></i> Table of Contents</h3>
            </nav>
            <main class="main-content" id="content-area"></main>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const contentArea = document.getElementById('content-area');
            const sidebar = document.getElementById('sidebar');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch('AI-Driven_Test_Automation_Playwright_Selenium_LLMs_&_More.md');
                let markdown = await response.text();

                // Pre-process Markdown
                markdown = markdown.replace(/^\s*(Module\s+\d+(\.\d+)?:?)/gm, '## MODULE_MARKER $1');
                markdown = markdown.replace(/^##\s+(Topic\s+\d+\.\d+:.*)/gm, '## TOPIC_MARKER $1');
                markdown = markdown.replace(/^\s*(\d+\.\d+:)/gm, '**$1**');
                markdown = markdown.replace(/^###\s+(section\s+\d+.*)/gmi, '## MODULE_MARKER $1');

                // Configure Renderer
                const renderer = new marked.Renderer();
                
                renderer.code = function(code, language) {
                    const safeCode = code ? String(code) : '';
                    let highlighted = safeCode;
                    
                    if (language && hljs.getLanguage(language)) {
                        try {
                            highlighted = hljs.highlight(safeCode, { language: language }).value;
                        } catch (e) {
                            highlighted = hljs.highlightAuto(safeCode).value;
                        }
                    } else {
                        highlighted = hljs.highlightAuto(safeCode).value;
                    }
                    
                    return `
                    <pre class="mac-window">
                        <div class="code-header">
                            <div class="window-controls">
                                <span class="control red"></span>
                                <span class="control yellow"></span>
                                <span class="control green"></span>
                            </div>
                            <button class="copy-btn" onclick="copyCode(this)"><i class="fas fa-copy"></i> Copy</button>
                        </div>
                        <code class="hljs language-${language || 'plaintext'}">${highlighted}</code>
                    </pre>`;
                };
                
                renderer.heading = function(text, level) {
                    const safeText = text ? String(text) : '';
                    const id = safeText.toLowerCase().replace(/[^\w]+/g, '-');
                    
                    if (safeText.startsWith('MODULE_MARKER ')) {
                        const cleanText = safeText.replace('MODULE_MARKER ', '');
                        const cleanId = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                        return `<h${level} class="module-section" id="${cleanId}">${cleanText}</h${level}>`;
                    }
                    
                    if (safeText.startsWith('TOPIC_MARKER ')) {
                        const cleanText = safeText.replace('TOPIC_MARKER ', '');
                        const cleanId = cleanText.toLowerCase().replace(/[^\w]+/g, '-');
                        return `<h${level} class="topic-section" id="${cleanId}">${cleanText}</h${level}>`;
                    }
                    
                    return `<h${level} id="${id}">${safeText}</h${level}>`;
                };

                // Render
                marked.setOptions({ renderer: renderer });
                contentArea.innerHTML = marked.parse(markdown);

                // Generate TOC
                const headings = contentArea.querySelectorAll('h2, h3');
                headings.forEach(heading => {
                    const link = document.createElement('a');
                    link.href = `#${heading.id}`;
                    link.textContent = heading.textContent;
                    link.style.paddingLeft = heading.tagName === 'H3' ? '1.5rem' : '0.5rem';
                    sidebar.appendChild(link);
                });

                loader.style.display = 'none';

            } catch (error) {
                contentArea.innerHTML = `<p style="color: #ff5f56;">Error loading notes: ${error.message}</p>`;
                loader.style.display = 'none';
            }
        });

        function copyCode(button) {
            const codeBlock = button.closest('.mac-window').querySelector('code');
            const text = codeBlock.innerText;
            navigator.clipboard.writeText(text).then(() => {
                button.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => {
                    button.innerHTML = '<i class="fas fa-copy"></i> Copy';
                }, 2000);
            });
        }
    </script>
</body>
</html>
